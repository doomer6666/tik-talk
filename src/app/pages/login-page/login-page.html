<div class="login__page">
  <div class="login">
    <div class="login__form">
      <h1>Вход</h1>
      <form class="login__form">
        <div class="form__field">
          <label for="username">Telegram username</label>
          <div class="form__field__input">
          <input type="text" id="username" name="username" placeholder="Введите логин" required />
            <img src="assets/tg.svg" alt="Telegram icon" class="form__field__icon" />
          </div>
        </div>
        <div class="form__field">
          <label for="password">Пароль</label>
          <div class="form__field__input">
            <input type="password" id="password" name="password" placeholder="Введите пароль" required />
            <img src="assets/invisible.svg" alt="invisible icon" class="form__field__icon" />
          </div>
        </div>
        <button type="submit" class="login__form__submit">Войти</button>
      </form>
    </div>
    <img src="assets/banner-logo.svg" alt="Logo" class="login__image" />
  </div>
</div>
